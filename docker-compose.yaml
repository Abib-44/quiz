services:
  backend:
    build: .
    container_name: backend
    ports:
      - "8000:80"
    volumes:
      - ./app:/code/app
    environment:
      - POSTGRES_USER=yourUser
      - POSTGRES_PW=changeit
      - POSTGRES_DB=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      - POSTGRES_USER=yourUser
      - POSTGRES_PASSWORD=changeit
      - POSTGRES_DB=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yourUser -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: