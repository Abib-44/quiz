services:
  backend:
    build: .
    ports:
      - "8001:8000"
    environment:
      - POSTGRES_USER=yourUser
      - POSTGRES_PASSWORD=changeit
      - POSTGRES_DB=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=yourUser
      - POSTGRES_PASSWORD=changeit
      - POSTGRES_DB=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yourUser -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: